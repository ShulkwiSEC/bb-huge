<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bb-huge — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0a0f; --bg2: #111118; --bg3: #1a1a24;
      --border: #2a2a3a; --text: #e2e2f0; --muted: #7070a0;
      --accent: #7c6aff; --accent2: #a78bfa;
      --mono: 'JetBrains Mono', monospace;
      --sans: 'Space Grotesk', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    @keyframes logoReveal {
      0% { opacity: 0; transform: scale(0.8) translateY(20px); filter: blur(4px); }
      100% { opacity: 1; transform: scale(1) translateY(0); filter: blur(0); }
    }
    @keyframes taglineFade {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes cardSlide {
      0% { opacity: 0; transform: translateY(30px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes bgPulse {
      0%, 100% { opacity: 0.03; }
      50% { opacity: 0.06; }
    }
    @keyframes gridShift {
      0% { transform: translateY(0); }
      100% { transform: translateY(-20px); }
    }

    body::before {
      content: "";
      position: fixed;
      top: -50%; left: -50%; width: 200%; height: 200%;
      background-image:
        radial-gradient(circle at 50% 50%, rgba(138, 122, 255, 0.04) 0%, transparent 30%),
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(255, 255, 255, 0.008) 40px, rgba(255, 255, 255, 0.008) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(255, 255, 255, 0.008) 40px, rgba(255, 255, 255, 0.008) 41px);
      animation: bgPulse 4s ease-in-out infinite, gridShift 8s linear infinite;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 380px;
      padding: 24px;
      position: relative;
      z-index: 1;
    }
    .logo {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 700;
      color: var(--accent2);
      text-align: center;
      margin-bottom: 6px;
      animation: logoReveal 0.6s ease-out;
    }
    .logo span { color: var(--muted); }
    .tagline {
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 32px;
      animation: taglineFade 0.5s ease-out 0.3s both;
    }
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      animation: cardSlide 0.5s ease-out 0.5s both;
    }
    label {
      display: block;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 6px;
      font-weight: 600;
      letter-spacing: .5px;
      text-transform: uppercase;
    }
    input[type=password] {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 11px 14px;
      font-family: var(--mono);
      font-size: 14px;
      width: 100%;
      outline: none;
      transition: border-color .15s, box-shadow 0.2s;
      letter-spacing: 2px;
    }
    input[type=password]:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,106,255,0.15);
    }
    .btn {
      width: 100%;
      margin-top: 18px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 12px;
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .15s, transform 0.1s;
    }
    .btn:hover { opacity: .85; transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }
    .error {
      margin-top: 14px;
      padding: 10px 14px;
      background: rgba(255,77,109,.1);
      border: 1px solid rgba(255,77,109,.25);
      color: #ff4d6d;
      border-radius: 7px;
      font-size: 13px;
      animation: cardSlide 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="logo">bb<span>-</span>huge 🤗</div>
    <div class="tagline">bug bounty hub</div>
    <div class="card">
      <form method="POST">
        <label for="dev_key">Dev Key</label>
        <input type="password" id="dev_key" name="dev_key"
               placeholder="•••••••••••" autofocus autocomplete="current-password">
        <button type="submit" class="btn">Enter →</button>
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
      </form>
    </div>
  </div>
</body>
</html>
